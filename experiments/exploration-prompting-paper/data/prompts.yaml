# TaskClassBench Batch 1
# Generated: 2026-03-24
# Categories: disguised-correction (20), context-contradiction (20)
# Total prompts: 40

- prompt: "we don't need the retry logic actually"
  context: "The agent has been designing an ETL pipeline with fault-tolerance as an explicit requirement. The last three exchanges detailed exponential backoff and dead-letter queue handling."
  expected_type: Analysis
  justification: "Removing retry logic from a fault-tolerant pipeline is not a simple deletion — it invalidates the entire reliability model built so far. The agent must reassess which components were designed around the assumption of retries and what replaces them. Treating this as a Quick deletion would leave the pipeline silently broken."
  category: disguised-correction

- prompt: "focus on readability, not performance"
  context: "The agent has been optimizing a data-processing script for throughput, profiling hot paths, and proposing vectorized operations. The user has reviewed two rounds of performance-focused refactors."
  expected_type: Analysis
  justification: "This is not an additive constraint — it is a reversal of the optimization axis the entire effort has been built around. All current recommendations (batching, caching, vectorization) may become anti-recommendations under a readability lens. A Quick response would preserve the wrong work."
  category: disguised-correction

- prompt: "the end user isn't technical"
  context: "The agent has been drafting API documentation with curl examples, HTTP status codes, and JSON schema snippets, targeting a developer audience."
  expected_type: Analysis
  justification: "Audience is a foundational document parameter, not a surface tweak. Every structural and vocabulary choice made so far is wrong if the audience has changed. The agent must re-evaluate format, terminology, examples, and assumed knowledge — not just simplify a few words."
  category: disguised-correction

- prompt: "this is a prototype, not production"
  context: "The agent has been recommending authentication middleware, rate limiting, and input validation for a Node.js API the user is building."
  expected_type: Analysis
  justification: "Framing something as a prototype does not mean removing all quality concerns — it means reweighting them. The agent must decide which safeguards are still warranted for a prototype versus which are genuinely premature, rather than dropping all recommendations wholesale."
  category: disguised-correction

- prompt: "we're not shipping this externally"
  context: "The agent has been advising on content tone, SEO metadata, and public-facing copy for a marketing landing page."
  expected_type: Analysis
  justification: "Internal versus external audience changes the purpose of the artifact, not just the distribution. An internal page may not need SEO at all, and tone conventions differ substantially. The agent must reframe the entire deliverable, not just remove a few keywords."
  category: disguised-correction

- prompt: "skip the unit tests for now"
  context: "The agent has been building out a test suite as an explicit deliverable for a checkout module, with the user approving test coverage targets in the prior exchange."
  expected_type: Analysis
  justification: "Skipping tests mid-build affects what can be safely claimed about the module's correctness. The agent must determine whether the module is now in a shippable state without tests, what the coverage gap implies, and whether downstream steps (CI gate, QA handoff) are still valid."
  category: disguised-correction

- prompt: "actually, ownership doesn't matter here"
  context: "The agent has spent two exchanges designing an access-control model for a multi-tenant SaaS app, with ownership as the core authorization primitive distinguishing tenant data."
  expected_type: Analysis
  justification: "Ownership is the structural spine of multi-tenant access control — removing it does not simplify the model, it collapses it. The agent needs to understand what authorization primitive the user wants to replace it with and whether tenant isolation is still achievable."
  category: disguised-correction

- prompt: "just treat all environments the same"
  context: "The agent has been designing a deployment pipeline with separate config handling for dev, staging, and production, including environment-specific secrets injection."
  expected_type: Analysis
  justification: "Environment parity is a deliberate choice with safety and cost implications, not a default simplification. Treating all environments identically means production secrets may reach dev, or prod safeguards may be absent in staging. The agent must evaluate which environment distinctions are safety-critical before collapsing them."
  category: disguised-correction

- prompt: "we're moving away from event-driven"
  context: "The agent has been designing a microservices architecture around a message broker with event sourcing, approved by the user in the prior session."
  expected_type: Analysis
  justification: "Event-driven is not a library or a tool — it is an architectural paradigm that shapes every service boundary, data flow, and failure mode. Abandoning it mid-design requires the agent to reassess every component, not just swap a messaging layer."
  category: disguised-correction

- prompt: "consistency isn't a priority for us"
  context: "The agent has been recommending a design system with shared tokens, reusable components, and a style guide to unify a fragmented frontend."
  expected_type: Analysis
  justification: "Consistency was the implicit rationale behind every recommendation made. If it is not a priority, the justification for a design system evaporates and the agent must re-examine whether the original goal (unifying the frontend) is still valid and what alternative approach fits."
  category: disguised-correction

- prompt: "forget the rate limits, just loop it"
  context: "The agent has been building an Apify scraper with polite delays and retry logic specifically because the target site aggressively blocks scrapers that exceed request thresholds."
  expected_type: Analysis
  justification: "Rate limits were not an aesthetic choice — they were the mechanism preventing bans. Removing them without analysis means the agent is likely to produce code that works in testing and fails permanently in production. The tradeoff must be explicitly evaluated, not blindly accepted."
  category: disguised-correction

- prompt: "we don't localize, so ignore that"
  context: "The agent has been building a date-formatting utility and recommended ISO 8601 storage with locale-aware display, which the user approved as part of a broader internationalization discussion."
  expected_type: Analysis
  justification: "Not localizing is a product decision that reaches beyond date formatting — it affects time zones, currency, sorting order, and string collation. The agent cannot simply drop the locale layer without understanding which of those other concerns still apply."
  category: disguised-correction

- prompt: "don't worry about backward compatibility"
  context: "The agent has been designing a REST API versioning strategy because the client confirmed that third-party integrators are using v1 endpoints in production."
  expected_type: Analysis
  justification: "Backward compatibility was established as a hard constraint based on live integrator dependencies, not a preference. Ignoring it would silently break third-party clients. The agent must determine whether the user is asking to deprecate v1 with a migration path or is unaware of the dependency."
  category: disguised-correction

- prompt: "the data model will change, don't hardcode it"
  context: "The agent has been writing transformation logic that maps specific field names from an incoming webhook payload to a database schema, a structure agreed on two exchanges prior."
  expected_type: Analysis
  justification: "This is not just a code style note — it signals that a foundational assumption about schema stability is now invalid. The agent must decide how to make the mapping dynamic (config file, metadata-driven, schema registry) before writing any more code."
  category: disguised-correction

- prompt: "real-time isn't required, just eventual"
  context: "The agent has been designing a notification system with WebSocket connections, live presence updates, and sub-second delivery guarantees as explicit requirements from the prior session."
  expected_type: Analysis
  justification: "Dropping real-time changes the entire delivery architecture — WebSockets, connection management, and latency budgets all become unnecessary complexity. The agent must re-evaluate the stack, not just relax a threshold."
  category: disguised-correction

- prompt: "we're not doing pagination"
  context: "The agent has been designing a REST API for a resource that currently holds tens of thousands of records, with offset pagination already stubbed out in the route plan."
  expected_type: Analysis
  justification: "No pagination on a large collection is an active performance and reliability risk, not a neutral simplification. The agent must understand whether the user means the endpoint will always be filtered (so pages are unnecessary) or genuinely wants unbounded responses — the implications differ sharply."
  category: disguised-correction

- prompt: "cost doesn't matter for this one"
  context: "The agent has been recommending a tiered caching strategy to minimize LLM API calls for a high-volume content generation pipeline, with token cost as the stated optimization target."
  expected_type: Analysis
  justification: "Cost was the primary optimization driver, so removing it doesn't simplify the problem — it removes the problem definition. The agent must re-establish what the optimization target now is and whether the entire caching architecture is still justified."
  category: disguised-correction

- prompt: "we handle errors at the UI layer"
  context: "The agent has been adding try/catch blocks, structured error responses, and logging to a backend API service as part of an explicit error-handling design."
  expected_type: Analysis
  justification: "Delegating all error handling to the UI layer contradicts separation of concerns and leaves the API unable to signal meaningful failure states. The agent must evaluate which errors are genuinely UI concerns versus which require backend handling regardless of UI strategy."
  category: disguised-correction

- prompt: "audit logging is overkill here"
  context: "The agent has been building an admin panel for a healthcare client where the user had previously confirmed that HIPAA compliance applies and that all data-access events must be logged."
  expected_type: Analysis
  justification: "HIPAA audit logging is not a quality-of-life feature — it is a compliance requirement. Calling it overkill suggests the user may not be connecting this decision to the compliance context established earlier. The agent must surface that conflict before proceeding."
  category: disguised-correction

- prompt: "just make it a single service for now"
  context: "The agent has been decomposing a system into microservices with clearly defined domain boundaries, inter-service contracts, and a service mesh, following an architecture approved by the user over multiple exchanges."
  expected_type: Analysis
  justification: "Collapsing a microservices design into a monolith mid-implementation is an architectural reversal, not a simplification step. Every interface, data ownership rule, and deployment unit designed so far must be re-evaluated. A Quick yes would invalidate an entire prior design session."
  category: disguised-correction

# --- context-contradiction (20) ---

- prompt: "can we just log the raw request body?"
  context: "The team agreed two exchanges ago to treat all inbound payloads as potentially containing PII and to apply field-level redaction before any logging. The agent implemented a logging middleware based on that constraint."
  expected_type: Analysis
  justification: "Logging the raw request body directly contradicts the established PII-redaction policy. Executing this naively would introduce a compliance violation that the prior design was specifically built to avoid. The agent must surface the conflict before touching the logger."
  category: context-contradiction

- prompt: "add a guest mode that skips login"
  context: "The authentication design mandates that every user session must be tied to a verified identity, a requirement the client confirmed when discussing SOC 2 scope two sessions ago."
  expected_type: Analysis
  justification: "A guest mode that bypasses login directly violates the every-session-must-be-verified constraint that was tied to a SOC 2 audit commitment. This cannot be treated as a feature addition — it requires explicit re-scoping of the security model."
  category: context-contradiction

- prompt: "store the API key in the repo for now"
  context: "The team established a secrets-management policy at project kickoff: no credentials in source control, all secrets through environment variables or a vault service."
  expected_type: Analysis
  justification: "Committing an API key to the repository directly violates the secrets-management policy agreed at kickoff. The agent cannot comply without explicitly acknowledging and overriding that constraint — 'for now' is not an exception mechanism."
  category: context-contradiction

- prompt: "just hardcode the user ID as 1 for testing"
  context: "The prior exchange established a multi-tenant data model where user ID determines row-level security filtering, and the team agreed no test should bypass tenant isolation."
  expected_type: Analysis
  justification: "Hardcoding user ID 1 collapses multi-tenant isolation in a system where that isolation was agreed to be inviolable even in tests. This could mask real authorization bugs. The agent must propose a safe testing alternative, not implement the bypass."
  category: context-contradiction

- prompt: "skip the migration script, just drop and recreate"
  context: "The deployment plan explicitly states that the staging database contains QA-validated seed data that must be preserved across schema changes, and that destructive schema operations require a sign-off."
  expected_type: Analysis
  justification: "Drop-and-recreate would destroy the QA-validated seed data that the deployment plan protects as irreplaceable. The sign-off requirement also exists precisely for this scenario. Executing naively would violate both constraints simultaneously."
  category: context-contradiction

- prompt: "can we disable CORS for the demo?"
  context: "The security review signed off on the API under the assumption that origin validation would always be enforced, and the client is a financial services firm with a strict no-exceptions policy on cross-origin controls."
  expected_type: Analysis
  justification: "CORS enforcement was a signed-off security control, not a convenience setting. Disabling it for a demo at a financial services client contradicts both the security review outcome and the client's stated policy. The agent must flag this conflict rather than treat it as a demo-mode toggle."
  category: context-contradiction

- prompt: "let's use a free-text field instead of the enum"
  context: "The data schema was designed with a strict enum for status values to enable deterministic downstream processing by three other services that parse and branch on those values."
  expected_type: Analysis
  justification: "Replacing the enum with free text breaks the parsing contracts of the three downstream services that depend on deterministic status values. This is a schema contract change, not a field type preference — it requires coordination with all consuming services."
  category: context-contradiction

- prompt: "make the error messages more descriptive"
  context: "The API was specifically designed to return generic error messages to external callers to avoid leaking internal stack traces or schema details, following an explicit security hardening decision."
  expected_type: Analysis
  justification: "More descriptive error messages to external callers directly reverses the security hardening decision that generic errors were meant to enforce. The agent must determine whether the user wants richer internal logging versus more descriptive external responses — these require different solutions."
  category: context-contradiction

- prompt: "just cache everything for 24 hours"
  context: "The caching strategy was designed with TTLs tuned per resource type because some resources (user permissions, pricing) were flagged as requiring near-real-time freshness for correctness."
  expected_type: Analysis
  justification: "A blanket 24-hour TTL contradicts the per-resource freshness requirements established in the caching design, specifically for permission and pricing data where stale values cause functional errors. The agent must identify which resources cannot accept a 24-hour TTL."
  category: context-contradiction

- prompt: "remove the confirmation step, it's annoying"
  context: "The UX specification included a mandatory confirmation dialog for destructive bulk actions after a stakeholder review determined that accidental bulk deletes had cost the team significant recovery time in the past."
  expected_type: Analysis
  justification: "The confirmation dialog was added as a deliberate safeguard after a documented incident — removing it for UX convenience directly contradicts that decision. The agent must surface the incident rationale before any change to that flow."
  category: context-contradiction

- prompt: "we'll just poll instead of webhooks"
  context: "The integration design committed to webhook-based delivery because the partner platform charges per API call, and the project budget assumed near-zero polling costs based on event-driven architecture."
  expected_type: Analysis
  justification: "Switching to polling directly invalidates the cost model the project budget was based on. Depending on polling frequency, this could introduce significant unplanned expense. The agent must quantify the cost delta before treating this as a simple architectural swap."
  category: context-contradiction

- prompt: "let's skip the schema validation on ingest"
  context: "The pipeline design mandated schema validation at ingestion as the first defense against corrupt records propagating downstream, a decision made after a prior incident where bad data reached production tables."
  expected_type: Analysis
  justification: "Schema validation at ingestion was the incident-response safeguard specifically designed to prevent a recurrence. Removing it re-opens the exact failure mode that prompted the design. The agent must treat this as a rollback of a safety control, not a performance optimization."
  category: context-contradiction

- prompt: "auto-approve small transactions"
  context: "The payment workflow design required human review on all transactions above $0 because the client operates under financial regulations that mandate an audit trail for every disbursement regardless of amount."
  expected_type: Analysis
  justification: "Auto-approving any transaction bypasses the audit trail requirement that applies to all disbursements under the client's regulatory framework. Even 'small' transactions are not exempt from this constraint. The agent must not implement this without explicit compliance sign-off."
  category: context-contradiction

- prompt: "just use the admin token for the integration test"
  context: "The testing policy established at sprint kickoff specifies that integration tests must run under least-privilege credentials to catch permission gaps that would not surface under an admin account."
  expected_type: Analysis
  justification: "Using the admin token in integration tests directly undermines the least-privilege testing policy, which exists to catch exactly the permission errors that admin accounts would suppress. This is not a convenience shortcut — it changes what the tests are capable of detecting."
  category: context-contradiction

- prompt: "inline the config values, we can clean up later"
  context: "The deployment architecture relies on environment-variable injection to support multiple deployment targets (dev, staging, prod) from a single build artifact, a constraint agreed upon during the infrastructure design."
  expected_type: Analysis
  justification: "Inlining config values bakes environment specifics into the build artifact, breaking the single-artifact multi-environment deployment model. 'Clean up later' rarely happens, and in the meantime the artifact becomes non-portable. The agent must flag this before any inlining."
  category: context-contradiction

- prompt: "output the full dataset in the response"
  context: "The API contract specified a maximum response payload of 1MB due to a gateway timeout imposed by the client's infrastructure team, with all large result sets to be streamed or paginated."
  expected_type: Analysis
  justification: "Returning the full dataset in a single response violates the 1MB payload limit enforced at the gateway, which would cause silent truncation or timeouts. This is a hard infrastructure constraint, not a soft guideline the agent can defer."
  category: context-contradiction

- prompt: "turn off 2FA for the internal tool"
  context: "The security policy for all internal tooling requires MFA on every account following a phishing incident that compromised an internal admin panel, a policy ratified by the security team and documented in the project brief."
  expected_type: Analysis
  justification: "Disabling 2FA on an internal tool directly reverses a security policy put in place after an actual breach. The agent must not treat this as a configuration toggle — it requires explicit acknowledgment of the security policy and approval from the security team."
  category: context-contradiction

- prompt: "fetch user data on the frontend"
  context: "The architecture review established that all PII retrieval must go through the backend API with authenticated server-side calls, so that PII never crosses the public network in a form the client can intercept or cache."
  expected_type: Analysis
  justification: "Client-side PII fetching contradicts the server-side-only PII policy established in the architecture review. Implementing this would expose sensitive data to the browser, a risk the design was specifically structured to eliminate."
  category: context-contradiction

- prompt: "write the test results directly to prod"
  context: "The testing infrastructure was designed with a strict environment separation rule: test runs write to isolated fixtures only, and production tables are write-protected during test execution."
  expected_type: Analysis
  justification: "Writing test results to production violates the environment isolation policy that exists to prevent test data from contaminating live records. This is not a shortcut — it is a data integrity risk against a production system."
  category: context-contradiction

- prompt: "reuse the same key for encryption and signing"
  context: "The cryptographic design specified separate keys for encryption and signing with distinct rotation schedules, following a security review that flagged key reuse as a vulnerability enabling cross-purpose attacks."
  expected_type: Analysis
  justification: "Reusing a single key for both encryption and signing contradicts the key-separation requirement that the security review identified as a vulnerability mitigation. The agent cannot comply without explicitly overriding a documented security decision."
  category: context-contradiction
# TaskClassBench Batch 2
# Categories: hidden-compound (20), cross-reference (20)
# Generated: 2026-03-24

# ---------------------------------------------------------------------------
# CATEGORY 3: hidden-compound
# Mechanism: Sounds like a single action but requires multiple distinct
# sub-tasks that cannot be collapsed into one response.
# ---------------------------------------------------------------------------

- prompt: "make it production-ready"
  context: "The team just finished a working prototype of a data ingestion pipeline. The developer has asked for a final review pass before handoff."
  expected_type: Compound
  justification: "Production-readiness is not a single action — it requires auditing the current state, identifying gaps across reliability/security/observability dimensions, implementing fixes, and verifying each one. Each of those is a distinct task type (Analysis, Build, QA). A Quick response cannot address all dimensions without collapsing them into a checklist that skips the actual work."
  category: hidden-compound

- prompt: "clean up the schema"
  context: "A Postgres database has been in use for 18 months across three microservices. The user wants to prepare it for a new team onboarding in two weeks."
  expected_type: Compound
  justification: "Schema cleanup spans at minimum: auditing current table and column definitions, identifying unused or redundant structures, assessing cross-service impact of removals, drafting migration scripts, and validating no data loss occurs. These are Analysis, Planning, Build, and QA subtasks that cannot be handled in a single response."
  category: hidden-compound

- prompt: "lock down the API"
  context: "An internal REST API has been running in development mode and will be exposed to external partners next month. No security review has been done yet."
  expected_type: Compound
  justification: "Locking down an API requires: cataloguing all endpoints and current auth state, identifying threat vectors (authn, authz, rate limiting, input validation, transport), implementing mitigations, and verifying coverage. That is a minimum of four distinct sub-tasks across Analysis, Build, and QA — not answerable as one response."
  category: hidden-compound

- prompt: "add monitoring"
  context: "A Node.js microservice processes async jobs from a queue. It has been in production for three months with no observability layer."
  expected_type: Compound
  justification: "Adding monitoring requires deciding what to instrument (metrics, logs, traces), choosing a tooling stack, instrumenting the code, configuring alerting thresholds, and verifying signals appear correctly in the target system. Each step has dependencies on the previous and spans Research, Build, and QA primitives."
  category: hidden-compound

- prompt: "optimize the queries"
  context: "A reporting dashboard runs against a PostgreSQL database and has become noticeably slow as the dataset has grown to 50M rows over the past year."
  expected_type: Compound
  justification: "Query optimization cannot be done as a single action — it first requires identifying which queries are slow (profiling/EXPLAIN), understanding the data access patterns, determining the right index or rewrite strategy per query, implementing changes, and benchmarking the result. This is Analysis → Planning → Build → QA, not a single step."
  category: hidden-compound

- prompt: "harden the auth flow"
  context: "A web application uses JWT-based authentication with a 7-day expiry. A security consultant flagged the implementation as underspecified in a recent review."
  expected_type: Compound
  justification: "Hardening auth involves multiple independent dimensions: token lifetime policy, refresh token rotation, revocation strategy, session invalidation, and potentially MFA enforcement. Each is a separate design decision with implementation and verification steps. This is not a single-verb task despite sounding like one."
  category: hidden-compound

- prompt: "document the system"
  context: "A four-service backend has grown organically over two years. There is no existing documentation. New engineers are joining next month."
  expected_type: Compound
  justification: "System documentation requires: inventorying all services and their interfaces, deciding what documentation types are needed (architecture, API reference, runbooks, onboarding guide), producing each artifact, and validating accuracy against the live system. These are distinct Research, Planning, Build, and QA sub-tasks that cannot be merged into one response."
  category: hidden-compound

- prompt: "fix the pipeline"
  context: "An ETL pipeline that ingests data from three external sources and loads into a data warehouse has been producing incorrect row counts for the past week."
  expected_type: Compound
  justification: "Fixing the pipeline requires first diagnosing where in the pipeline the discrepancy originates (not yet known), then determining root cause, then implementing a fix, then verifying correctness across all three sources. Without completing the diagnostic sub-task, the fix sub-task cannot begin — these are sequential, not collapsible."
  category: hidden-compound

- prompt: "improve the test coverage"
  context: "A Python service has 23% line coverage. It handles billing calculations and is about to undergo a major refactor."
  expected_type: Compound
  justification: "Improving test coverage requires: auditing which code paths are untested and why, assessing which paths carry the highest risk, writing tests for prioritized paths, and verifying the coverage metric has improved meaningfully. The audit and prioritization steps are Analysis; writing tests is Build; verification is QA. These cannot be skipped or merged."
  category: hidden-compound

- prompt: "standardize the error handling"
  context: "A Node.js API has five controllers, each with ad-hoc try/catch patterns. Some return stack traces to the client. The team wants consistency before open-sourcing the project."
  expected_type: Compound
  justification: "Standardizing error handling requires: auditing all current error paths, designing a consistent schema (error codes, response shape, logging contract), implementing it across controllers, and verifying no edge cases expose sensitive data. Design and audit are Analysis; implementation is Build; verification is QA."
  category: hidden-compound

- prompt: "migrate to TypeScript"
  context: "A JavaScript backend codebase of ~12,000 lines is being considered for TypeScript migration. The team has agreement in principle but no plan."
  expected_type: Compound
  justification: "A TypeScript migration requires: assessing current codebase structure and hotspots, defining a migration strategy (incremental vs. big bang, strict mode policy), executing the conversion in stages, and validating type safety at each stage. This is Research, Planning, Build, and QA — any single response that skips planning and sequencing will produce an unusable answer."
  category: hidden-compound

- prompt: "containerize it"
  context: "A Flask application currently runs directly on a virtual machine with a manual deployment process. The team wants to move to Docker as part of a broader platform modernization."
  expected_type: Compound
  justification: "Containerization involves: analyzing the current runtime environment and dependencies, writing a Dockerfile and .dockerignore, configuring environment variable and secret injection, setting up a build pipeline, and validating the container behaves identically to the VM deployment. Multiple distinct artifacts and a verification step are required."
  category: hidden-compound

- prompt: "refactor the data layer"
  context: "A legacy monolith has database access scattered across 30 files with raw SQL queries mixed into business logic. The team plans to extract a separate data service."
  expected_type: Compound
  justification: "Refactoring a data layer requires: mapping all current data access points, designing the target abstraction, implementing it incrementally, and verifying no regressions. The mapping step alone is non-trivial and distinct from the design step, which is distinct from implementation. This is Analysis → Planning → Build → QA, not one action."
  category: hidden-compound

- prompt: "tune the LLM prompt"
  context: "An LLM-powered feature classifies customer support tickets into routing categories. Accuracy in production is 71% and the team wants it above 85%."
  expected_type: Compound
  justification: "Prompt tuning requires: diagnosing failure modes in the current prompt (which categories fail, why), forming hypotheses about improvements, iterating on the prompt against a test set, and validating the change does not regress correct categories. Diagnosis and iteration are separate sub-tasks; neither can be skipped for a meaningful result."
  category: hidden-compound

- prompt: "set up the CI/CD"
  context: "A new service repository has been scaffolded. The team currently deploys manually via SSH and wants automated delivery before the first external beta."
  expected_type: Compound
  justification: "Setting up CI/CD requires: defining the pipeline stages (lint, test, build, deploy), choosing tooling and environment targets, writing pipeline configuration, configuring secrets, and verifying end-to-end by triggering a test run. Each of these is a separate artifact and decision — they span Planning, Build, and QA and cannot be compressed."
  category: hidden-compound

- prompt: "deduplicate the data"
  context: "A customer records table has accumulated ~15% duplicate rows due to a race condition in the ingestion layer that has since been fixed. The table has 4M rows."
  expected_type: Compound
  justification: "Deduplication at scale requires: defining what constitutes a duplicate (business-rule analysis), choosing a deduplication strategy (soft-delete vs. merge vs. hard-delete), writing and testing the deduplication query on a subset, executing at scale with safeguards, and verifying record counts. Skipping the definition step makes the query step meaningless."
  category: hidden-compound

- prompt: "tighten up the permissions"
  context: "A multi-tenant SaaS application has had a permission model that evolved organically. An audit found three roles with broader access than intended."
  expected_type: Compound
  justification: "Tightening permissions requires: auditing the current role-permission matrix, mapping intended access per role against actual, identifying the gaps, designing a corrected model, implementing role changes, and verifying no legitimate access is broken. This is a minimum four-step process spanning Analysis, Design, Build, and QA."
  category: hidden-compound

- prompt: "make the UI accessible"
  context: "A dashboard built in React has never been tested for accessibility. A client contract now requires WCAG 2.1 AA compliance before go-live next quarter."
  expected_type: Compound
  justification: "Accessibility compliance requires: running an automated audit to identify violation categories, manually reviewing areas automated tools miss (keyboard nav, screen reader flow, color contrast), prioritizing and fixing violations, and re-auditing to confirm AA pass. This is a multi-phase cycle with distinct Analysis, Build, and QA steps."
  category: hidden-compound

- prompt: "add rate limiting"
  context: "A public-facing API has no rate limiting. A recent spike caused a backend outage and the team wants protection in place within the sprint."
  expected_type: Compound
  justification: "Adding rate limiting requires: deciding the limiting strategy (per-IP, per-user, per-endpoint, global), choosing implementation location (gateway, middleware, application layer), implementing the logic, configuring thresholds based on usage data, and verifying both the happy path and the throttled response. These are distinct Planning, Build, and QA sub-tasks."
  category: hidden-compound

- prompt: "consolidate the configs"
  context: "A microservices deployment has configuration spread across .env files, hardcoded values, a Vault instance, and a Kubernetes ConfigMap with no consistent pattern."
  expected_type: Compound
  justification: "Consolidating configuration requires: inventorying all config sources and their current usage, designing a unified config contract, migrating each service, and verifying no service loses a required value. The inventory alone is Research; the design is Analysis/Planning; migration is Build; verification is QA. No shortcut produces a correct result."
  category: hidden-compound

# ---------------------------------------------------------------------------
# CATEGORY 4: cross-reference
# Mechanism: The message references prior work, findings, or sessions not
# fully present in the current context. The agent must reconcile information
# across contexts before answering.
# ---------------------------------------------------------------------------

- prompt: "does that match what we found before?"
  context: "The team ran a benchmarking session last week comparing three vector database options. The current conversation is reviewing a new architecture proposal that picks one of those databases."
  expected_type: Analysis
  justification: "Answering requires retrieving the prior benchmarking findings, identifying which criteria were evaluated, and comparing them against the current proposal's rationale. None of that content is present in this message. Answering without it produces a guess, not an analysis."

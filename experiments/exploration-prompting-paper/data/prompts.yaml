- prompt: "Would a GDPR auditor clear this consent flow?"
  context: "A new user consent flow has been designed for a lead generation form that sends data to multiple downstream processors."
  expected_type: Analysis
  justification: "GDPR compliance requires specific consent language, granularity, withdrawal mechanisms, and processor disclosure that a UX designer might not have prioritized. The agent must evaluate through a regulatory lens with distinct acceptance criteria from the design team's goals."

  justification: "Distrust without a named flaw means the agent must examine the output from multiple angles — schema compliance, semantic correctness, hallucination risk, edge case handling — to find what might be triggering the user's skepticism. Acknowledging the feeling without diagnosing the source is insufficient."
  category: vague-affect

- prompt: "Something about this architecture worries me."
  context: "The agent outlined a proposed microservices split for an n8n-based automation platform. The user read the summary."
  expected_type: Analysis
  justification: "The user's worry is a signal without a target. The agent must investigate multiple candidate issues — coupling, failure propagation, operational complexity, observability gaps — and surface the most plausible sources of genuine concern. This is an open-ended diagnostic task."
  category: vague-affect

- prompt: "This doesn't feel production-ready."
  context: "A workflow automation was completed and the agent confirmed all nodes were connected and tested. The user is unconvinced."
  expected_type: Analysis
  justification: "Production-readiness is a multi-dimensional criterion: error handling, retry logic, monitoring, secrets management, load behavior. The agent must examine each dimension the user might be reacting to, not just restate that tests passed. The concern is real and requires structured investigation."
  category: vague-affect

- prompt: "I'm not comfortable with this approach."
  context: "The agent recommended storing API credentials as environment variables in a CI/CD pipeline configuration file. The user paused."

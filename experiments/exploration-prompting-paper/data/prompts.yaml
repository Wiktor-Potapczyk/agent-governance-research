- prompt: "I'm skeptical this will scale."
  context: "The agent designed an n8n workflow that fetches and processes records one at a time in a loop. Performance was not discussed."
  expected_type: Analysis
  justification: "The user has flagged a scalability concern without specifying the bottleneck. The agent must analyze the workflow's throughput characteristics — sequential vs. parallel execution, API rate limits, memory pressure, n8n execution time limits — and assess where the design breaks under load."
  category: vague-affect

- prompt: "I'm not sure I buy this recommendation."
  context: "The agent recommended switching from a polling-based trigger to a webhook-based trigger in an automation workflow."
  expected_type: Analysis
  justification: "The user's skepticism indicates the recommendation's rationale did not land. The agent must identify what the user likely doubts — reliability of webhook delivery, added infrastructure complexity, latency tradeoffs — and surface evidence for and against rather than simply restating the recommendation."
  category: vague-affect

- prompt: "This documentation feels incomplete."
  context: "The agent wrote technical documentation for a new n8n node configuration. The user read the first two sections."
  expected_type: Analysis
  justification: "Incompleteness is a structural judgment that requires identifying which coverage areas are absent — examples, error handling documentation, configuration options, versioning notes — not just noting that it could be longer. The agent must diagnose the gaps the user is reacting to."
  category: vague-affect

- prompt: "Something about the test coverage seems thin."
  context: "The agent reviewed a test suite for a data transformation function and confirmed all listed tests pass."
  expected_type: Analysis
  justification: "Thin coverage is not synonymous with failing tests. The user senses that the suite does not adequately represent the input space. The agent must examine what cases are absent — boundary values, null inputs, unexpected types, large payloads — to diagnose what the user's instinct is pointing at."
  category: vague-affect

- prompt: "I don't like how this was deployed."
  context: "A new workflow was deployed directly to the production n8n instance without a staging validation step. The agent confirmed it is running."
  expected_type: Analysis
  justification: "The user's displeasure could reflect process concerns (skipped staging), risk concerns (no rollback plan), or oversight concerns (no monitoring set up post-deploy). The agent must identify which dimension the user is reacting to and assess the actual exposure, not just acknowledge the feeling."
  category: vague-affect

- prompt: "This seems like it could break easily."
  context: "The agent built a workflow that depends on an external API returning a specific field name in its response payload."
  expected_type: Analysis
  justification: "Fragility intuition here points at a concrete risk: unversioned API contracts, missing null checks, no fallback handling. The agent must examine the specific coupling points and assess which failure modes the user is sensing, rather than offering generic reassurance about the workflow passing current tests."
  category: vague-affect


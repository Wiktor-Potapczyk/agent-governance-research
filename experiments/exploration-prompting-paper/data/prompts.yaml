# ── Category 6: vague-affect ───────────────────────────────────────────────────

- prompt: "This feels off somehow."
  context: "The agent just presented a monitoring alert configuration for a data pipeline. The user reviewed it briefly."
  expected_type: Analysis
  justification: "The user has sensed a problem but cannot name it. The agent must diagnose potential sources of discomfort — threshold values, missing alert coverage, severity miscategorization, notification routing — rather than simply acknowledging the concern. This requires investigative analysis, not a Quick response."

- prompt: "What would someone from legal say here?"
  context: "The team is drafting terms of service language around AI-generated content ownership for a client-facing product."
  expected_type: Analysis
  justification: "Legal review applies standards of enforceability, liability exposure, jurisdictional variation, and ambiguity risk that the drafting team is unlikely to have applied. The agent must reason through a legal lens and identify provisions that would not survive counsel review."
  category: perspective-shift

- prompt: "How would this feel to a power user?"
  context: "The team redesigned the keyboard shortcut scheme for an internal tool, consolidating several multi-step actions into single shortcuts."
  expected_type: Analysis
  justification: "Power users have deeply internalized previous shortcuts and depend on muscle memory. The agent must model the disruption from their frame — relearning cost, productivity regression, frustration — which differs from the designer's perspective of the new scheme being 'cleaner'."
  category: perspective-shift

- prompt: "What's the DBA's objection going to be?"
  context: "An engineer proposes adding a JSON column to a PostgreSQL table to avoid a schema migration. The agent has reviewed the data model."
  expected_type: Analysis
  justification: "A DBA's concerns center on indexing limitations, query planning degradation, schema integrity loss, and long-term maintainability — a lens that an application engineer optimizing for short-term velocity would not apply. The agent must reason from that frame to surface the likely objection."

- prompt: "What would the customer success team hate about this?"
  context: "The product team is proposing to remove a legacy export feature to simplify the codebase. The agent has the feature specs."
  expected_type: Analysis
  justification: "Customer success teams have visibility into which customers rely on features that engineering considers low-usage. The agent must reason from their frame — churn risk, escalation volume, relationship impact — which yields concerns that the technical analysis omits."
  category: perspective-shift

- prompt: "How does this look from the QA team's side?"
  context: "A new CI/CD pipeline was designed with a single integration test stage and no unit test gate. The developer considers it sufficient."
  expected_type: Analysis
  justification: "The QA team prioritizes test granularity, failure isolation, and feedback loop speed — concerns that a developer optimizing for deploy velocity would underweight. The agent must adopt the QA frame and surface what they would reject or flag, which is substantive analytical work."

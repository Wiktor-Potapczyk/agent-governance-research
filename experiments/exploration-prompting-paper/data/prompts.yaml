# ── Category 5: perspective-shift ──────────────────────────────────────────────

- prompt: "What would [REDACTED] think of this copy?"
  context: "The agent just drafted award nomination copy for an industry awards submission. The content lead will review it."
  expected_type: Analysis
  justification: "This requires modeling [REDACTED]'s specific professional priorities — tone, audience alignment, brand voice — not just evaluating the copy generically. The agent must reason from a named stakeholder's frame and apply their likely criteria. It is not answerable with a factual lookup or single-step action."
  category: perspective-shift

- prompt: "How would a junior dev read this?"
  context: "The team has written a new API integration guide. The agent is reviewing documentation quality."
  expected_type: Analysis
  justification: "The agent must adopt the frame of someone with limited experience and identify what would be unclear, intimidating, or missing from that perspective. This is a non-trivial cognitive shift from the expert frame in which the doc was written. A Quick response would just describe the doc, not model a reader."
  category: perspective-shift

- prompt: "Does a security auditor pass this?"
  context: "A proposed authentication flow for an internal tool has been outlined. The team wants to know if it would survive scrutiny."
  expected_type: Analysis
  justification: "The agent must apply a security auditor's rubric — threat modeling, credential handling, session management, compliance — not a general quality check. This requires adopting a specialized adversarial frame and evaluating against criteria that differ from the developer's original intent."
  category: perspective-shift

- prompt: "What does the end-user actually care about here?"
  context: "The team is debating whether to surface raw error codes in the UI or abstract them. The agent has seen the technical arguments."
  expected_type: Analysis
  justification: "This requires the agent to shift from the system-builder's frame (correctness, debuggability) to the end-user's frame (clarity, recoverable actions, emotional state). The question is about priority inversion — what matters to one group may be noise to another. Not answerable without reasoning through the user perspective."
  category: perspective-shift

- prompt: "Would a regulator flag anything here?"
  context: "A data pipeline that collects and stores user behavioral data has been described. The company operates in EU markets."
  expected_type: Analysis
  justification: "The agent must adopt a GDPR/data protection regulator's frame and evaluate consent, retention, data minimization, and cross-border transfer against that lens. This is distinct from a general review and requires applying a non-obvious legal/compliance perspective. The answer cannot be Quick."
  category: perspective-shift

- prompt: "How does this look to a first-time customer?"
  context: "The agent helped design an onboarding email sequence for a new SaaS product. The team is satisfied but wants an outside perspective."
  expected_type: Analysis
  justification: "A first-time customer has no internal context, no brand familiarity, and a different reading order than the team assumes. The agent must model the cold-start experience and evaluate what signals trust, what creates confusion, and what is invisible without prior knowledge. This is a frame-shift analysis task, not an acknowledgment."
  category: perspective-shift

- prompt: "What would our biggest competitor say about this?"
  context: "The team is reviewing a product positioning document that claims a key differentiator in data accuracy."
  expected_type: Analysis
  justification: "This requires reasoning from the competitor's likely counter-narrative — what they would challenge, what they would exploit, and what evidence they would cite. It demands modeling an adversarial external perspective against the current framing, which is non-trivial analytical work."
  category: perspective-shift

- prompt: "Would a new hire understand this architecture diagram?"
  context: "An architecture diagram for the n8n automation pipeline has just been finalized. The team wants to assess its communicative clarity."
  expected_type: Analysis
  justification: "A new hire lacks the implicit knowledge encoded in the diagram — naming conventions, assumed dependencies, historical decisions. The agent must identify what is legible vs. opaque to someone without that context, which requires a genuine perspective shift from the expert authors."
  category: perspective-shift

- prompt: "What would ops say about deploying this?"
  context: "A developer has proposed a deployment strategy that involves frequent rolling restarts during business hours. The agent is reviewing it."
  expected_type: Analysis
  justification: "Ops teams prioritize stability, rollback safety, incident blast radius, and on-call burden — priorities that differ from the developer's velocity focus. The agent must surface ops-specific concerns that the author's frame would suppress. This is substantive Analysis, not a simple acknowledgment."
  category: perspective-shift

- prompt: "How would a non-technical stakeholder read this report?"
  context: "The agent wrote a technical post-mortem after a pipeline failure. The PM will share it with leadership."
  expected_type: Analysis
  justification: "A non-technical stakeholder reads for business impact, accountability, and recurrence risk — not root cause technical depth. The agent must identify what would confuse, alarm, or be irrelevant to that audience, and whether the current framing serves them. This is frame-translation analysis."
  category: perspective-shift

- prompt: "What if we evaluated this as a compliance officer would?"
  context: "The team just finalized a vendor data-sharing agreement that involves passing enriched contact data to a third-party API."
  expected_type: Analysis
  justification: "A compliance officer applies a different standard than the engineering team — contractual liability, data processing agreements, purpose limitation — and would surface risks invisible to the developers. The agent must evaluate through that lens, not just restate the technical facts."
  category: perspective-shift

- prompt: "Does this hold up under a manager's review?"
  context: "A junior developer wrote their first technical design doc for a new database indexing strategy."
  expected_type: Analysis
  justification: "A manager evaluates for clarity of reasoning, risk acknowledgment, alternatives considered, and decision confidence — not just technical correctness. The agent must adopt a senior reviewer's frame and assess whether the document would pass that scrutiny, which requires non-trivial evaluation."
  category: perspective-shift

- prompt: "What would a user with slow internet think?"
  context: "The agent reviewed a dashboard design that loads several large data visualizations on initial page load."
  expected_type: Analysis
  justification: "The design was evaluated from a well-connected developer's perspective. Modeling a constrained user requires reasoning about load time impact on usability, perceived responsiveness, and frustration points that are invisible at normal speeds. This is a substantive perspective shift, not a factual lookup."
  category: perspective-shift

- prompt: "How does this read to someone who didn't attend the meeting?"
  context: "The agent helped draft a decision memo summarizing a strategy session. The memo will be sent to the wider team."
  expected_type: Analysis
  justification: "Without meeting context, the reader lacks the framing, debate history, and rationale that makes the memo intelligible to attendees. The agent must model information asymmetry and identify where the memo would be opaque, misleading, or missing context for cold readers."

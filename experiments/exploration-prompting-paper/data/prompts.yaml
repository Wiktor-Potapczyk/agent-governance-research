  justification: "Discomfort about a security-adjacent recommendation could stem from multiple valid concerns — secrets in version control, environment variable leakage, rotation difficulty. The agent must diagnose which specific risks are triggering the hesitation rather than reassure generically."
  category: vague-affect

- prompt: "This prompt seems wrong somehow."
  context: "The agent drafted a system prompt for a new LLM classification node. The user read it once."
  expected_type: Analysis
  justification: "The user's vague 'wrong' could reference ambiguous instructions, missing output format constraints, incorrect tone, unintended scope, or conflicting directives. The agent must read the prompt critically from multiple angles to identify what is most likely causing the user's instinct, rather than asking them to be more specific."
  category: vague-affect

- prompt: "I have a bad feeling about the timeline."
  context: "The agent laid out a three-week implementation plan for a new awards automation pipeline with daily milestones."
  expected_type: Analysis
  justification: "The user's unease about the timeline could derive from underestimated dependencies, missing risk buffers, external blockers not modeled, or scope creep potential. The agent must examine the plan against these dimensions to surface the concrete risk the user is sensing, not simply validate or dismiss the feeling."
  category: vague-affect

- prompt: "The data looks suspicious."
  context: "The agent ran a pipeline test and returned row counts and sample records from an enrichment step."
  expected_type: Analysis
  justification: "Suspicious data without a specified anomaly requires the agent to examine multiple potential explanations — duplicates, unexpected nulls, distribution shifts, truncation, encoding errors — and identify which observation most likely triggered the user's concern. This is diagnostic analysis."
  category: vague-affect

- prompt: "That response felt too confident."
  context: "A research subagent returned a synthesis with no hedges or uncertainty flagging. The agent passed the result to the user."
  expected_type: Analysis
  justification: "Overclaiming in an LLM output is a calibration problem that requires re-examining the source material, the instructions given to the agent, and the epistemic status of the claims made. The user has flagged a quality signal that demands structured investigation, not acknowledgment."
  category: vague-affect

- prompt: "Something's missing from this plan."
  context: "The agent produced a deployment checklist for a new automation workflow. The user reviewed it and paused."
  expected_type: Analysis
  justification: "The user cannot name what is absent. The agent must reason through the checklist systematically against dimensions typically covered — rollback, monitoring, access permissions, documentation, stakeholder sign-off — and identify the most plausible gap the user is sensing."
  category: vague-affect

- prompt: "I don't know, this API design feels messy."
  context: "The agent designed a REST API contract for a new internal tool with 12 endpoints. The user skimmed the spec."
  expected_type: Analysis
  justification: "Perceived messiness in an API design could stem from inconsistent naming, poor resource modeling, over-fetching patterns, missing pagination, or unclear error semantics. The agent must diagnose these dimensions without anchoring to a preconceived answer, since the user themselves cannot specify the source."
  category: vague-affect

- prompt: "This email doesn't land right."
  context: "The agent drafted an outreach email to a potential awards program organizer. The user read the draft."
  expected_type: Analysis
  justification: "An email that 'doesn't land' could fail on tone, credibility signaling, call-to-action clarity, length, or opening hook. The agent must evaluate each of these axes from the recipient's perspective, not just revise surface wording. This requires diagnostic judgment, not a simple edit."
  category: vague-affect

- prompt: "I feel like we're missing something obvious."
  context: "The team finished defining a QA checklist for a new n8n workflow. Everyone agreed and the agent confirmed it."
  expected_type: Analysis
  justification: "The user's intuition that something obvious is missing is a meaningful signal that warrants investigation. The agent must revisit the checklist against common omission patterns — error states, edge inputs, dependency failures — rather than accept the consensus as complete."
  category: vague-affect

- prompt: "This doesn't sit right with me."
  context: "The agent recommended deduplicating records by email address before inserting into the CRM. The user has domain knowledge about how the CRM handles contacts."
  expected_type: Analysis
  justification: "The user's discomfort signals a potential mismatch between the recommended logic and real-world behavior the user has observed. The agent must examine the deduplication approach for edge cases — alias emails, contact merging rules, downstream sync effects — rather than defend the original recommendation."

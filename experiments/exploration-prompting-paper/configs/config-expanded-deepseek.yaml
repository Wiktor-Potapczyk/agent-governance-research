# TaskClassBench — Exploration vs Extraction Experiment
# 311 prompts x 3 variants = 933 classifications
# Generated from prompts-expanded.yaml

description: "TaskClassBench — 311 prompts, 3 variants (280 traps + 31 quick controls)"

prompts:
  - file://classifier-baseline.txt
  - file://classifier-exploration.txt
  - file://classifier-extraction.txt
  - file://classifier-baseline-gated.txt
  - file://classifier-extraction-v2.txt
  - file://classifier-exploration-v2.txt
  - file://classifier-exploration-v3.txt

providers:
  - id: openai:chat:deepseek-chat
    config:
      apiBaseUrl: https://api.deepseek.com
      apiKeyEnvar: DEEPSEEK_API_KEY
      temperature: 0
      max_tokens: 2048

defaultTest:
  assert:
    - type: regex
      value: "TASK TYPE:\\s*(Quick|Research|Analysis|Content|Build|Planning|Compound)"
      metric: valid_type

tests:
  # --- disguised-correction [1/311] ---
  - description: "disguised-correction: we don't need the retry logic actually"
    vars:
      context: "The agent has been designing an ETL pipeline with fault-tolerance as an explicit requirement. The last three exchanges detailed exponential backoff and dead-letter queue handling."
      user_message: "we don't need the retry logic actually"
    assert:
      - type: not-contains
        value: "TASK TYPE: Quick"
        metric: not_quick
    metadata:
      category: "disguised-correction"
      expected_type: "Analysis"

  # --- disguised-correction [2/311] ---
  - description: "disguised-correction: focus on readability, not performance"
    vars:
      context: "The agent has been optimizing a data-processing script for throughput, profiling hot paths, and proposing vectorized operations. The user has reviewed two rounds of performance-focused refactors."

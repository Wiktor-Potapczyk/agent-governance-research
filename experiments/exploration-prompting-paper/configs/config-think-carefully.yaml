# TaskClassBench - Think Carefully variant (mechanism ablation)
# 311 prompts x 1 variant x 4 models = 1244 classifications

description: "Think Carefully variant - mechanism ablation"

maxConcurrency: 4

prompts:
  - file://classifier-think-carefully.txt

providers:
  - id: openai:chat:deepseek-chat
    config:
      apiBaseUrl: https://api.deepseek.com
      apiKeyEnvar: DEEPSEEK_API_KEY
      temperature: 0
      max_tokens: 2048

  - id: google:gemini-2.5-flash
    config:
      apiKeyEnvar: GOOGLE_API_KEY
      temperature: 0
      maxOutputTokens: 2048

  - id: anthropic:messages:claude-haiku-4-5-20251001
    config:
      apiKeyEnvar: ANTHROPIC_API_KEY
      temperature: 0
      max_tokens: 2048

  - id: anthropic:messages:claude-4-sonnet-20250514
    config:
      apiKeyEnvar: ANTHROPIC_API_KEY
      temperature: 0
      max_tokens: 2048

defaultTest:
  assert:
    - type: regex
      value: "TASK TYPE:\\s*(Quick|Research|Analysis|Content|Build|Planning|Compound)"
      metric: valid_type

tests:
  - vars:
      user_message: "we don't need the retry logic actually"
      context: "The agent has been designing an ETL pipeline with fault-tolerance as an explicit requirement. The last three exchanges detailed exponential backoff and dead-letter queue handling."
    assert:
      - type: not-contains
        value: "TASK TYPE: Quick"
        metric: correct_type
  - vars:
      user_message: "focus on readability, not performance"
      context: "The agent has been optimizing a data-processing script for throughput, profiling hot paths, and proposing vectorized operations. The user has reviewed two rounds of performance-focused refactors."
    assert:
      - type: not-contains
        value: "TASK TYPE: Quick"
        metric: correct_type
  - vars:
      user_message: "the end user isn't technical"
      context: "The agent has been drafting API documentation with curl examples, HTTP status codes, and JSON schema snippets, targeting a developer audience."
    assert:
      - type: not-contains
        value: "TASK TYPE: Quick"
        metric: correct_type
  - vars:
      user_message: "this is a prototype, not production"
      context: "The agent has been recommending authentication middleware, rate limiting, and input validation for a Node.js API the user is building."
    assert:
      - type: not-contains
        value: "TASK TYPE: Quick"
        metric: correct_type
  - vars:
      user_message: "we're not shipping this externally"
      context: "The agent has been advising on content tone, SEO metadata, and public-facing copy for a marketing landing page."
    assert:
      - type: not-contains
        value: "TASK TYPE: Quick"
        metric: correct_type
  - vars:
      user_message: "skip the unit tests for now"
      context: "The agent has been building out a test suite as an explicit deliverable for a checkout module, with the user approving test coverage targets in the prior exchange."
    assert:
      - type: not-contains
        value: "TASK TYPE: Quick"
        metric: correct_type
  - vars:
      user_message: "actually, ownership doesn't matter here"
      context: "The agent has spent two exchanges designing an access-control model for a multi-tenant SaaS app, with ownership as the core authorization primitive distinguishing tenant data."
    assert:
      - type: not-contains
        value: "TASK TYPE: Quick"
        metric: correct_type
  - vars:
      user_message: "just treat all environments the same"
      context: "The agent has been designing a deployment pipeline with separate config handling for dev, staging, and production, including environment-specific secrets injection."
    assert:
      - type: not-contains
        value: "TASK TYPE: Quick"
